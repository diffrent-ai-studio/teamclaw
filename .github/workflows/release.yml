name: Release

on:
  push:
    tags:
      - "v*"

# Cancel in-progress release if a new tag is pushed
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS job creates the GitHub Release and uploads macOS artifacts
  release-macos:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Write production build config from secret
        env:
          BUILD_CONFIG_PRODUCTION: ${{ secrets.BUILD_CONFIG_PRODUCTION }}
        run: |
          if [ -n "$BUILD_CONFIG_PRODUCTION" ]; then
            echo "$BUILD_CONFIG_PRODUCTION" > build.config.json
            echo "✅ Production build config written (replaces repo default)"
          else
            echo "⚠️ No BUILD_CONFIG_PRODUCTION secret set, using defaults"
          fi

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm install --no-save @tauri-apps/cli
          echo "test" > /tmp/test_sign_file
          npx @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" /tmp/test_sign_file
          echo "✅ Signing key verified successfully"
          rm -f /tmp/test_sign_file /tmp/test_sign_file.sig

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./apps/desktop -> target
          key: ${{ matrix.target }}

      - name: Install protoc (for prost_build)
        run: brew install protobuf

      # Parallel: pnpm install + frontend build, introspect sidecar build, certificate import
      - name: Build all (parallel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          mkdir -p apps/desktop/binaries

          # 1) pnpm install → then frontend build (sequential chain, backgrounded)
          (
            set -e
            pnpm install
            echo "pnpm install done, building frontend..."
            BUILD_ENV=production pnpm --filter @teamclaw/app build
            echo "frontend build done"
          ) > /tmp/frontend.log 2>&1 &
          PID_FRONTEND=$!

          # 2) Build teamclaw-introspect sidecar (background)
          (
            set -e
            echo "Building teamclaw-introspect for ${{ matrix.target }}..."
            cargo build --release --locked --manifest-path apps/desktop/Cargo.toml -p teamclaw-introspect --target ${{ matrix.target }}
            cp apps/desktop/target/${{ matrix.target }}/release/teamclaw-introspect apps/desktop/binaries/teamclaw-introspect-${{ matrix.target }}
            chmod +x apps/desktop/binaries/teamclaw-introspect-${{ matrix.target }}
            echo "teamclaw-introspect ready"
          ) > /tmp/introspect.log 2>&1 &
          PID_INTROSPECT=$!

          # 3) Import Apple certificate (background, fast but independent)
          (
            if [ -z "$APPLE_CERTIFICATE" ]; then
              echo "No certificate, using ad-hoc signing."
              exit 0
            fi
            set -e
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1)
            CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
            echo "Certificate imported: $CERT_ID"
          ) > /tmp/cert.log 2>&1 &
          PID_CERT=$!

          # Wait for all; dump logs on failure
          FAILED=0
          wait $PID_FRONTEND   || { echo "::error::Frontend build failed:"; cat /tmp/frontend.log; FAILED=1; }
          wait $PID_INTROSPECT || { echo "::error::introspect build failed:"; cat /tmp/introspect.log; FAILED=1; }
          wait $PID_CERT       || { echo "::error::Certificate import failed:"; cat /tmp/cert.log; FAILED=1; }

          if [ "$FAILED" -ne 0 ]; then exit 1; fi

          echo "All parallel tasks completed"
          ls -lh apps/desktop/binaries/
          ls -lh packages/app/dist/ | head -5

      # Skip beforeBuildCommand since frontend is already built above,
      # and substitute __OSS_BASE_URL__ in updater endpoints (drop if OSS not configured).
      - name: Finalize tauri.conf.json for build
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          python3 - <<'EOF'
          import json, os
          with open('apps/desktop/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          conf['build']['beforeBuildCommand'] = 'echo frontend already built'
          endpoints = conf.get('plugins', {}).get('updater', {}).get('endpoints', [])
          bucket = os.environ.get('OSS_BUCKET', '')
          endpoint_host = os.environ.get('OSS_ENDPOINT', '').replace('https://', '').replace('http://', '').rstrip('/')
          oss_base = f'https://{bucket}.{endpoint_host}' if bucket and endpoint_host else ''
          if oss_base:
              endpoints = [e.replace('__OSS_BASE_URL__', oss_base) for e in endpoints]
          endpoints = [e for e in endpoints if '__OSS_BASE_URL__' not in e]
          conf.setdefault('plugins', {}).setdefault('updater', {})['endpoints'] = endpoints
          with open('apps/desktop/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Final updater endpoints:')
          for e in endpoints:
              print(f'  - {e}')
          EOF

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER_GITHUB_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
          DEVICE_JWT_SECRET: ${{ secrets.DEVICE_JWT_SECRET }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TeamClaw ${{ github.ref_name }}"
          releaseBody: |
            ## Installation

            ### macOS (one-line install)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/different-ai-studio/teamclaw/main/scripts/install-mac.sh | bash
            ```

            ### macOS (manual)
            1. Download the `.dmg` file below (choose `aarch64` for Apple Silicon, `x64` for Intel)
            2. Open the DMG and drag TeamClaw to Applications
            3. Before opening, run in Terminal:
               ```
               sudo xattr -dr com.apple.quarantine /Applications/Teamclaw.app
               ```
            4. Open TeamClaw from Applications

            > **Why is this needed?** TeamClaw is not yet notarized with Apple. macOS blocks unsigned apps downloaded from the internet. The command above removes this restriction.

            ### Windows
            Download and run the `.exe` installer below.
          releaseDraft: false
          prerelease: false
          args: "--target ${{ matrix.target }}"

      - name: Upload to Alibaba Cloud OSS (CN mirror)
        continue-on-error: true
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "OSS secrets not configured, skipping mirror upload"
            exit 0
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          python3 - <<'EOF'
          import oss2, os, glob, sys

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          endpoint = os.environ['OSS_ENDPOINT']
          if not endpoint.startswith('http'):
              endpoint = 'https://' + endpoint
          bucket = oss2.Bucket(auth, endpoint, os.environ['OSS_BUCKET'])
          version = os.environ['GITHUB_REF_NAME']
          target = os.environ['MATRIX_TARGET']

          host = os.environ['OSS_ENDPOINT'].replace('https://', '').replace('http://', '')
          oss_base = f'https://{os.environ["OSS_BUCKET"]}.{host}'

          files = glob.glob(f'apps/desktop/target/{target}/release/bundle/dmg/*.dmg')
          if not files:
              print(f'No DMG found for target {target}, skipping')
              sys.exit(0)

          for f in files:
              key = f'releases/{version}/{os.path.basename(f)}'
              print(f'Uploading {os.path.basename(f)} -> oss://{os.environ["OSS_BUCKET"]}/{key}')
              bucket.put_object_from_file(key, f)
              print(f'✅ {oss_base}/{key}')

          # Upload latest.txt and install-mac-cn.sh only once (aarch64 job)
          if target != 'aarch64-apple-darwin':
              sys.exit(0)

          # These are mutable "pointer" objects that change every release.
          # Without an explicit Cache-Control header, Alibaba CDN applies its
          # default TTL (hours), so users keep installing the previous version
          # until the cached entry expires. Tell the CDN to re-validate.
          short_cache = {
              'Cache-Control': 'max-age=60, must-revalidate',
          }

          bucket.put_object(
              'releases/latest.txt',
              version.encode(),
              headers={**short_cache, 'Content-Type': 'text/plain; charset=utf-8'},
          )
          print(f'✅ {oss_base}/releases/latest.txt -> {version}')

          with open('scripts/install-mac-cn.sh', 'r') as f:
              script = f.read()
          bucket.put_object(
              'install-mac-cn.sh',
              script.encode(),
              headers={**short_cache, 'Content-Type': 'text/x-shellscript; charset=utf-8'},
          )
          print(f'✅ {oss_base}/install-mac-cn.sh')
          EOF

  # Windows job uploads artifacts to the same GitHub Release created by macOS job
  release-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write production build config from secret
        env:
          BUILD_CONFIG_PRODUCTION: ${{ secrets.BUILD_CONFIG_PRODUCTION }}
        shell: bash
        run: |
          if [ -n "$BUILD_CONFIG_PRODUCTION" ]; then
            echo "$BUILD_CONFIG_PRODUCTION" > build.config.json
            echo "✅ Production build config written (replaces repo default)"
          else
            echo "⚠️ No BUILD_CONFIG_PRODUCTION secret set, using defaults"
          fi

      - name: Verify Tauri signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          npm install --no-save @tauri-apps/cli
          echo "test" > "$RUNNER_TEMP/test_sign_file"
          npx @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$RUNNER_TEMP/test_sign_file"
          echo "✅ Signing key verified successfully"
          rm -f "$RUNNER_TEMP/test_sign_file" "$RUNNER_TEMP/test_sign_file.sig"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/pnpm/store/v3
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./apps/desktop -> target

      - name: Install protoc (for prost_build)
        shell: bash
        run: choco install protoc -y

      - name: Install dependencies and build frontend
        env:
          BUILD_ENV: production
        run: |
          pnpm install
          pnpm --filter @teamclaw/app build

      - name: Prepare binaries directory
        shell: bash
        run: mkdir -p apps/desktop/binaries

      - name: Build teamclaw-introspect sidecar
        shell: bash
        run: |
          cargo build --release --locked --manifest-path apps/desktop/Cargo.toml -p teamclaw-introspect
          cp apps/desktop/target/release/teamclaw-introspect.exe apps/desktop/binaries/teamclaw-introspect-x86_64-pc-windows-msvc.exe
          echo "teamclaw-introspect ready"

      # Skip beforeBuildCommand since frontend is already built above
      - name: Finalize tauri.conf.json for build
        shell: python
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          import json, os
          with open('apps/desktop/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          conf['build']['beforeBuildCommand'] = 'echo frontend already built'
          endpoints = conf.get('plugins', {}).get('updater', {}).get('endpoints', [])
          bucket = os.environ.get('OSS_BUCKET', '')
          endpoint_host = os.environ.get('OSS_ENDPOINT', '').replace('https://', '').replace('http://', '').rstrip('/')
          oss_base = f'https://{bucket}.{endpoint_host}' if bucket and endpoint_host else ''
          if oss_base:
              endpoints = [e.replace('__OSS_BASE_URL__', oss_base) for e in endpoints]
          endpoints = [e for e in endpoints if '__OSS_BASE_URL__' not in e]
          conf.setdefault('plugins', {}).setdefault('updater', {})['endpoints'] = endpoints
          with open('apps/desktop/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Final updater endpoints:')
          for e in endpoints:
              print(f'  - {e}')

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DEVICE_JWT_SECRET: ${{ secrets.DEVICE_JWT_SECRET }}
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TeamClaw ${{ github.ref_name }}"
          releaseBody: |
            ## Installation

            ### macOS (one-line install)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/different-ai-studio/teamclaw/main/scripts/install-mac.sh | bash
            ```

            ### macOS (manual)
            1. Download the `.dmg` file below
            2. Open the DMG and drag TeamClaw to Applications
            3. Before opening, run in Terminal:
               ```
               sudo xattr -dr com.apple.quarantine /Applications/Teamclaw.app
               ```
            4. Open TeamClaw from Applications

            > **Why is this needed?** TeamClaw is not yet notarized with Apple. macOS blocks unsigned apps downloaded from the internet. The command above removes this restriction.

            ### Windows
            Download and run the `.exe` installer below.
          releaseDraft: false
          prerelease: false
          # Windows: NSIS installer, no p2p feature (avoids wmi/windows-core conflicts)
          args: "--bundles nsis -- --no-default-features"

      - name: Upload to Alibaba Cloud OSS (CN mirror)
        continue-on-error: true
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "OSS secrets not configured, skipping mirror upload"
            exit 0
          fi
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          python3 - <<'EOF'
          import oss2, os, glob, sys

          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          endpoint = os.environ['OSS_ENDPOINT']
          if not endpoint.startswith('http'):
              endpoint = 'https://' + endpoint
          bucket = oss2.Bucket(auth, endpoint, os.environ['OSS_BUCKET'])
          version = os.environ['GITHUB_REF_NAME']

          files = glob.glob('apps/desktop/target/release/bundle/nsis/*.exe')
          if not files:
              print('No NSIS installer found, skipping')
              sys.exit(0)

          for f in files:
              key = f'releases/{version}/{os.path.basename(f)}'
              print(f'Uploading {os.path.basename(f)} -> oss://{os.environ["OSS_BUCKET"]}/{key}')
              bucket.put_object_from_file(key, f)
              host = os.environ['OSS_ENDPOINT'].replace('https://', '').replace('http://', '')
              print(f'✅ https://{os.environ["OSS_BUCKET"]}.{host}/{key}')
          EOF

  update-release-notes:
    needs: [release-macos, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mirror latest.json to OSS
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "OSS not configured, skipping latest.json mirror"
            exit 0
          fi
          gh release download "$VERSION" \
            --repo ${{ github.repository }} \
            --pattern 'latest.json' \
            --dir /tmp/oss-latest
          python3 -m pip install oss2 --quiet --break-system-packages 2>/dev/null || pip3 install oss2 --quiet --break-system-packages
          python3 - <<'EOF'
          import json
          import oss2, os
          auth = oss2.Auth(os.environ['OSS_ACCESS_KEY_ID'], os.environ['OSS_ACCESS_KEY_SECRET'])
          endpoint = os.environ['OSS_ENDPOINT']
          if not endpoint.startswith('http'):
              endpoint = 'https://' + endpoint
          bucket = oss2.Bucket(auth, endpoint, os.environ['OSS_BUCKET'])
          version = os.environ['VERSION']
          cdn_base = 'https://teamclaw.ucar.cc'
          manifest_path = '/tmp/oss-latest/latest.json'

          with open(manifest_path, 'r', encoding='utf-8') as f:
              manifest = json.load(f)

          for entry in manifest.get('platforms', {}).values():
              url = entry.get('url', '')
              if not url:
                  continue
              filename = url.rstrip('/').split('/')[-1]
              if filename:
                  entry['url'] = f'{cdn_base}/releases/{version}/{filename}'

          mirrored_manifest_path = '/tmp/oss-latest/latest.oss.json'
          with open(mirrored_manifest_path, 'w', encoding='utf-8') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')

          # Root pointer: must re-validate so the Tauri updater sees new releases.
          # Per-version archive: immutable, default long cache is fine.
          bucket.put_object_from_file(
              'releases/latest.json',
              mirrored_manifest_path,
              headers={
                  'Cache-Control': 'max-age=60, must-revalidate',
                  'Content-Type': 'application/json; charset=utf-8',
              },
          )
          bucket.put_object_from_file(f'releases/{version}/latest.json', mirrored_manifest_path)
          print(f'Mirrored latest.json -> {oss_base}/releases/latest.json')
          print(f'Also archived -> {oss_base}/releases/{version}/latest.json')
          EOF

      - name: Append CN mirror section to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          if [ -z "$OSS_BUCKET" ]; then
            echo "OSS not configured, skipping release notes update"
            exit 0
          fi
          CN_BASE="https://teamclaw.ucar.cc"
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          CURRENT=$(gh release view "$VERSION" --repo ${{ github.repository }} --json body -q '.body')

          CN_SECTION="

          ---

          ### 国内加速下载

          #### macOS（一键安装）
          \`\`\`bash
          curl -fsSL ${CN_BASE}/install-mac-cn.sh | bash
          \`\`\`

          #### macOS（手动下载）
          - Apple Silicon：[TeamClaw_${VERSION_NUM}_aarch64.dmg](${CN_BASE}/releases/${VERSION}/TeamClaw_${VERSION_NUM}_aarch64.dmg)
          - Intel：[TeamClaw_${VERSION_NUM}_x64.dmg](${CN_BASE}/releases/${VERSION}/TeamClaw_${VERSION_NUM}_x64.dmg)

          #### Windows
          - [TeamClaw_${VERSION_NUM}_x64-setup.exe](${CN_BASE}/releases/${VERSION}/TeamClaw_${VERSION_NUM}_x64-setup.exe)"

          gh release edit "$VERSION" --repo ${{ github.repository }} --notes "${CURRENT}${CN_SECTION}"
          echo "✅ Release notes updated with CN mirror links"
